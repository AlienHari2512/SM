<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Secret Message</title>

<style>
:root {
  --card-bg: rgba(255, 255, 255, 0.25);
  --text: #ffffff;
  --primary: #ffffff;
  --btn: linear-gradient(135deg, #c9184a, #ff758f);
}

body.night {
  --card-bg: rgba(0, 0, 0, 0.45);
  --btn: linear-gradient(135deg, #ff758f, #ff4d6d);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  background:
    linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
    url("rose.m.png") center / cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Segoe UI", system-ui, sans-serif;
  transition: background 0.8s ease;
}

body.night {
  background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url("rose.n.png") center / cover no-repeat;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(18px);
  padding: 40px;
  border-radius: 30px;
  text-align: center;
  width: min(92%, 420px);
  box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  color: var(--primary);
  margin-bottom: 10px;
}

p {
  color: var(--text);
  font-size: 18px;
  line-height: 1.6;
}

input {
  margin-top: 16px;
  padding: 12px;
  width: 100%;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  outline: none;
  display: none;
}

button {
  margin-top: 22px;
  padding: 14px 34px;
  border: none;
  border-radius: 999px;
  background: var(--btn);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 16px 30px rgba(0,0,0,0.35);
}

.toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255,255,255,0.3);
  color: #fff;
  font-size: 14px;
  padding: 8px 14px;
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleTheme()">🌗 Theme</button>

<div class="card">
  <h1>Secret Message</h1>
  <p id="msg">This message is locked… only one person can open it.</p>

  <input id="nameInput" placeholder="Enter the secret name 💌">
  <button id="actionBtn" onclick="handleClick()">Unlock</button>
</div>

<!-- 🔊 Secret sound -->
<audio id="secretSound" src="assets/sound.mp3" preload="auto"></audio>

<script>
(function autoTheme() {
  const hour = new Date().getHours();
  if (hour >= 18 || hour < 6) {
    document.body.classList.add("night");
  }
})();

function toggleTheme() {
  document.body.classList.toggle("night");
}

let stage = 0;

function handleClick() {
  const input = document.getElementById("nameInput");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("actionBtn");
  const sound = document.getElementById("secretSound");

  if (stage === 0) {
    input.style.display = "block";
    btn.innerText = "Reveal 💖";
    stage = 1;
    return;
  }

  const name = input.value.trim().toLowerCase();

  if (name === "dilna") {
    sound.currentTime = 0;
    sound.play();

    msg.innerHTML = `
      I fell in love during the moment I never noticed , yeah i know you dont believe in love , so by any point of time in your life if you decide to get married please give a message to me if you are interested . I will come for you. I am not expecting any answer now . So dont stress to give an answer if you are not interested 💫✨
    `;

    input.style.display = "none";
    btn.style.display = "none";
  } else {
    msg.innerHTML = `
      This message isn’t meant for you.<br>
      Try again… ✨
    `;
    input.value = "";
  }
}
</script>

</body>

</html>
